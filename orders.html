<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>orders(1)</title>
    <link rel="stylesheet" href="/CSS/Header.css" />
    <link rel="stylesheet" href="/CSS/General.css" />
    <link rel="stylesheet" href="/CSS/orders.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="main-header js-orders-header"></header>
    <main class="main">
      <section class="main-section">
        <div class="orders-title">
          <p class="orders-text bold">Your Orders:</p>
        </div>
        <div class="orders-list">
          <div class="order-container">
            <div class="order-header">
              <div>
                <p class="bold">Order Placed:</p>
                <p>October 29</p>
              </div>
              <div>
                <p class="bold">Total:</p>
                <p>$140.00</p>
              </div>
              <div>
                <p class="bold">Order Id:</p>
                <p>882c7734-42c5-60b2-cac4-6b2ddcf47b61</p>
              </div>
            </div>
            <div class="orders-flex">
              <div class="order">
                <div class="product-details">
                  <img
                    class="product-image"
                    src="/Images/Game-card-images/final-fantasy-nocopyright.jpg"
                    alt=""
                  />
                </div>
                <div class="order-info">
                  <div class="product-description">
                    <div>Final Fantasy XVI</div>
                    <div>Quantity: 1</div>
                  </div>
                  <div class="arrival-text">Arriving on: November 7</div>
                  <div class="progress-div">
                    <div class="progress-status-text">
                      <p>Prepared</p>
                      <p>Sent</p>
                      <p>Delivered</p>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-status"></div>
                    </div>
                  </div>
                </div>
                <div class="buy-again-div">
                  <button class="buy-again-button">
                    <img
                      class="buy-it-again-image"
                      src="/Images/Icons/buy-again.png"
                    />
                    Buy It Again
                  </button>
                </div>
              </div>
              <hr width="90%" />
              <div class="order">
                <div class="product-details">
                  <img
                    class="product-image"
                    src="/Images/Game-card-images/doom.webp"
                    alt=""
                  />
                </div>
                <div class="order-info">
                  <div class="product-description">
                    <div>Doom: Eternal</div>
                    <div>Quantity: 3</div>
                  </div>
                  <div class="arrival-text">Arriving on: November 2</div>
                  <div class="progress-div">
                    <div class="progress-status-text">
                      <p>Prepared</p>
                      <p>Sent</p>
                      <p>Delivered</p>
                    </div>
                    <div class="progress-bar">
                      <div class="progress-status"></div>
                    </div>
                  </div>
                </div>
                <div class="buy-again-div">
                  <button class="buy-again-button">
                    <img
                      class="buy-it-again-image"
                      src="/Images/Icons/buy-again.png"
                    />
                    Buy It Again
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="/scripts/orders.js" type="module"></script>
  </body>
</html>
