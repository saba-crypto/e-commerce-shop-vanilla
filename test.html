<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inspect container</title>
    <link rel="stylesheet" href="/CSS/inspect.css" />
    <link rel="stylesheet" href="/CSS/General.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wdth,wght@0,75..100,100..900;1,75..100,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background-container"></div>
    <div class="inspect-container">
      <img class="close-button" src="/Images/Icons/remove.png" />
      <img
        class="image card-image"
        src="/Images/Game-card-images/mario-world-nocopyright.png"
      />
      <div class="body">
        <div class="game-name-div">
          <div class="game-name">Mario 64 pocket edition</div>
        </div>
        <div class="dev-name-div game-info">
          <img class="icon" src="/Images/Icons/coding.png" alt="" />
          <div class="dev-name game-sub">Developer(s): Nintendo</div>
        </div>
        <div class="rating-div game-info">
          <img class="icon" src="/Images/Icons/pixel_star.png" alt="" />
          <div class="rating game-sub">Rating: 4.3</div>
        </div>
        <div class="release-date game-info">
          <img class="icon" src="Images/Icons/calendar.png" alt="" />
          <div class="release-date game-sub">Release Date: 09.04.2001</div>
        </div>
        <button class="inspect-add-to-cart js-add-to-cart">Add To Cart</button>
      </div>
    </div>
  </body>
</html>
